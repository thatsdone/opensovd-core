name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yaml
